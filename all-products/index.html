<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전체상품관리</title>
<style>
  :root{
    --bg:#0f1115; --panel:#1a1d24; --panel2:#232730; --line:#2e333d;
    --text:#e7eaf0; --muted:#9aa3b2; --accent:#3d7eff; --inferred:#7a6cff; --sidebar-w:268px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,"Pretendard","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--text);display:flex;overflow:hidden}

  /* Sidebar */
  #sidebar{width:var(--sidebar-w);flex-shrink:0;height:100vh;overflow-y:auto;
    background:var(--panel);border-right:1px solid var(--line);padding:16px 0}
  #sidebar h1{font-size:14px;font-weight:700;padding:4px 18px 2px;letter-spacing:-.2px}
  #sidebar .sub{font-size:11px;color:var(--muted);padding:0 18px 14px;border-bottom:1px solid var(--line)}
  .group{margin-top:10px}
  .group > .ghead{font-size:11px;color:var(--muted);font-weight:600;padding:8px 18px 4px;letter-spacing:.3px}
  .nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;
    font-size:12.5px;color:#c7cdd9;border-left:3px solid transparent}
  .nav-item:hover{background:var(--panel2)}
  .nav-item.active{background:#202632;border-left-color:var(--accent);color:#fff;font-weight:600}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:#48506055;flex-shrink:0}
  .nav-item.active .dot{background:var(--accent)}
  .nav-item .tag{margin-left:auto;font-size:9.5px;padding:1px 6px;border-radius:8px;background:#2b3140;color:#8b94a6}
  .nav-item .tag.state{background:#3a2f2a;color:#d6a679}
  .nav-item .tag.dialog{background:#2f2a3a;color:#b29fe0}
  .nav-item .tag.toast{background:#27352c;color:#7fc79a}

  /* Stage */
  #main{flex:1;height:100vh;display:flex;flex-direction:column;min-width:0}
  #topbar{height:52px;flex-shrink:0;display:flex;align-items:center;gap:12px;
    padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  #topbar .crumb{font-size:11px;color:var(--muted)}
  #topbar .title{font-size:14px;font-weight:700}
  #topbar .navbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
  .tb-btn{font-size:12px;color:#c7cdd9;background:var(--panel2);border:1px solid var(--line);
    border-radius:7px;padding:6px 11px;cursor:pointer}
  .tb-btn:hover{background:#2c313c}
  .tb-btn:disabled{opacity:.4;cursor:default}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:#c7cdd9;cursor:pointer;
    padding:5px 11px;border:1px solid var(--line);border-radius:7px;background:var(--panel2)}
  .toggle .sw{width:30px;height:17px;border-radius:9px;background:#3a4150;position:relative;transition:.15s}
  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:.15s}
  body.show-hot .toggle .sw{background:var(--accent)}
  body.show-hot .toggle .sw::after{left:15px}

  #stage{flex:1;overflow:auto;background:#0b0d11;
    background-image:radial-gradient(#1a1f28 1px,transparent 1px);background-size:22px 22px;
    display:flex;justify-content:center;padding:28px 28px 80px}
  #screenWrap{position:relative;display:inline-block;align-self:flex-start;
    box-shadow:0 12px 40px #0009;border-radius:10px;overflow:hidden;background:#fff}
  #screenImg{display:block;width:1440px;height:auto}

  /* Hotspots */
  .hotspot{position:absolute;cursor:pointer;border-radius:7px;transition:background .1s,box-shadow .1s;z-index:5}
  .hotspot:hover{background:rgba(61,126,255,.22);box-shadow:0 0 0 2px var(--accent)}
  .hotspot.inferred:hover{background:rgba(122,108,255,.22);box-shadow:0 0 0 2px var(--inferred)}
  body.show-hot .hotspot{background:rgba(61,126,255,.13);box-shadow:0 0 0 1.5px rgba(61,126,255,.65)}
  body.show-hot .hotspot.inferred{background:rgba(122,108,255,.13);box-shadow:0 0 0 1.5px rgba(122,108,255,.65)}
  .hotspot .hlabel{display:none;position:absolute;top:-9px;left:6px;font-size:10px;font-weight:600;
    background:var(--accent);color:#fff;padding:2px 7px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 8px #0006}
  .hotspot.inferred .hlabel{background:var(--inferred)}
  body.show-hot .hotspot .hlabel{display:block}
  .hotspot.fullclick{border-radius:0}

  /* Flow panel */
  #flow{position:fixed;right:22px;bottom:22px;width:286px;max-height:60vh;overflow:auto;
    background:rgba(20,23,30,.96);backdrop-filter:blur(8px);border:1px solid var(--line);
    border-radius:14px;padding:13px;box-shadow:0 16px 50px #000a;z-index:30}
  #flow h3{font-size:11px;color:var(--muted);letter-spacing:.3px;margin-bottom:9px;display:flex;align-items:center;gap:6px}
  #flow h3 .live{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #3d7eff66}70%{box-shadow:0 0 0 8px #3d7eff00}100%{box-shadow:0 0 0 0 #3d7eff00}}
  .flow-btn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;
    background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:6px;cursor:pointer;color:var(--text)}
  .flow-btn:hover{background:#2c313c;border-color:#3a4150}
  .flow-btn .ico{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:grid;place-items:center;font-size:11px;background:var(--accent);color:#fff}
  .flow-btn.inferred .ico{background:var(--inferred)}
  .flow-btn .lab{font-size:12px;font-weight:600;line-height:1.2}
  .flow-btn .dst{font-size:10px;color:var(--muted);margin-top:2px}
  .flow-empty{font-size:11.5px;color:var(--muted);padding:5px 2px;line-height:1.5}
  #flow .legend{margin-top:7px;padding-top:9px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);display:flex;gap:13px}
  #flow .legend span{display:flex;align-items:center;gap:5px}
  #flow .legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2c313c;border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

    <h1 id="sbTitle">제목</h1>
    <div class="sub" id="sbSub">서브타이틀</div>

  <div id="main">

      </div>

        <button class="tb-btn" id="resetBtn">처음으로</button>
      </div>
    </div>
    <div id="stage">
      <div id="screenWrap">
        <img id="screenImg" alt="">
        <div id="hotLayer"></div>
      </div>
    </div>
  </div>

  <div id="flow">
    <h3><span class="live"></span> 이 화면에서 할 수 있는 동작</h3>

  for(const s of S.filter(x=>x.group===g)){
    const it=document.createElement("div"); it.className="nav-item"; it.dataset.id=s.id;
    const lbl={state:'상태',dialog:'팝업',toast:'토스트'}[s.kind]||'기본';
    it.innerHTML=`<span class="dot"></span><span>${s.variant||s.name}</span><span class="tag ${s.kind||''}">${lbl}</span>`;
    it.onclick=()=>go(s.id,true);
    wrap.appendChild(it);
  }
  navList.appendChild(wrap);
}

// Navigation
const img=document.getElementById("screenImg"), hotLayer=document.getElementById("hotLayer");
const titleEl=document.getElementById("title"), crumbEl=document.getElementById("crumb");
const flowList=document.getElementById("flowList"), stage=document.getElementById("stage");

function navTo(to){ if(to==="__back__"){ back(); return; } go(to,true); }
function back(){ if(hist.length){ go(hist.pop(),false); } }

function go(id, push){
  const s=byId[id]; if(!s) return;
  if(push && curId && curId!==id) hist.push(curId);
  curId=id;
  img.src=SCRDIR+"/"+id+".png";
  titleEl.textContent=(s.name||"")+(s.variant?" · "+s.variant:"");
  crumbEl.textContent=s.group||"";
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.id===id));
  const act=document.querySelector(".nav-item.active"); if(act) act.scrollIntoView({block:"nearest"});

  hotLayer.innerHTML="";
  (H[id]||[]).forEach(h=>{
    const d=document.createElement("div");
    d.className="hotspot"+(h.inferred?" inferred":"")+(h.full?" fullclick":"");
    d.style.left=h.x+"%"; d.style.top=h.y+"%"; d.style.width=h.w+"%"; d.style.height=h.h+"%";
    const dst=byId[h.to]; d.title=(h.label||"")+(dst?" → "+dst.name+" "+(dst.variant||""):"");
    d.innerHTML=`<span class="hlabel">${h.label||""}</span>`;
    d.onclick=()=>navTo(h.to);
    hotLayer.appendChild(d);
  });

  flowList.innerHTML="";
  const outs=T[id]||[];
  if(!outs.length){ flowList.innerHTML='<div class="flow-empty">정의된 다음 동작이 없습니다. 좌측 목록에서 이동하세요.</div>'; }
  else outs.forEach(o=>{
    const d=byId[o.to];
    const b=document.createElement("button");
    b.className="flow-btn"+(o.inferred?" inferred":"");
    b.innerHTML=`<span class="ico">→</span><span><span class="lab">${o.label}</span><span class="dst">${o.to==="__back__"?"이전 화면":(d?d.name+" · "+(d.variant||""):o.to)}</span></span>`;
    b.onclick=()=>navTo(o.to);
    flowList.appendChild(b);
  });
  document.getElementById("backBtn").disabled = hist.length===0;
  stage.scrollTop=0;
  location.hash=id;
}

document.getElementById("backBtn").onclick=back;
document.getElementById("resetBtn").onclick=()=>{ hist=[]; go(META.startId||S[0].id,false); };
document.getElementById("hotToggle").onclick=()=>document.body.classList.toggle("show-hot");
document.addEventListener("keydown",e=>{ if(e.key==="Escape") back(); if(e.key==="h") document.body.classList.toggle("show-hot"); });

const start=(location.hash||"").replace("#","");
go(byId[start]?start:(META.startId||S[0].id), false);
</script>
</body>
</html>
